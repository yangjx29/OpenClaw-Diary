<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 芝士的学习日记</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1e1e1e;
            --muted: #6b7280;
            --border: #e5e7eb;
            --key-blue: #086ADA;
            --orange: #f97316;
            --green: #22c55e;
            --blue: #3b82f6;
            --dot-red: #ff5f56;
            --dot-yellow: #ffbd2e;
            --dot-green: #27c93f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Fira Code', 'JetBrains Mono', ui-monospace, monospace;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            padding: 40px 20px;
            font-size: 14px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 56rem;
            margin: 0 auto;
            position: relative;
        }
        
        /* Header Card */
        .header-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .dots {
            display: flex;
            gap: 6px;
        }
        
        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }
        
        .dot-red { background: var(--dot-red); }
        .dot-yellow { background: var(--dot-yellow); }
        .dot-green { background: var(--dot-green); }
        
        .filename {
            color: var(--fg);
            font-size: 13px;
        }
        
        .status {
            color: var(--green);
            font-size: 12px;
        }
        
        .header-content {
            padding: 28px;
            text-align: center;
        }
        
        .main-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .main-title .prompt {
            color: var(--key-blue);
        }
        
        .subtitle {
            color: var(--muted);
            font-size: 13px;
        }
        
        .subtitle .prompt {
            color: var(--green);
        }
        
        /* Date Tabs */
        .date-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 4px;
        }
        
        .date-tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .date-tab:hover {
            border-color: var(--key-blue);
        }
        
        .date-tab.active {
            background: var(--key-blue);
            color: white;
            border-color: var(--key-blue);
        }
        
        /* Screen Container */
        .screen-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .screen {
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .screen.active {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Entry Card */
        .entry {
            border-bottom: 1px solid var(--border);
        }
        
        .entry:last-child {
            border-bottom: none;
        }
        
        .entry-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
        }
        
        .entry-filename {
            color: var(--fg);
            font-size: 13px;
        }
        
        .entry-status {
            color: var(--green);
            font-size: 12px;
        }
        
        .entry-body {
            padding: 16px;
        }
        
        .entry-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--fg);
        }
        
        .entry-content {
            font-size: 13px;
            color: var(--muted);
        }
        
        .entry-content p {
            margin-bottom: 8px;
        }
        
        .entry-content strong {
            color: var(--key-blue);
        }
        
        /* Quote box */
        .quote-box {
            border-left: 2px solid var(--key-blue);
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 0 6px 6px 0;
            margin: 12px 0;
            font-size: 12px;
        }
        
        .quote-title {
            color: var(--key-blue);
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        /* Card Line */
        .card-line {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .card-line:last-child {
            margin-bottom: 0;
        }
        
        .key { color: var(--key-blue); min-width: 120px; }
        .colon { color: var(--muted); }
        .string { color: var(--fg); font-weight: 500; }
        .number { color: var(--orange); font-weight: 600; }
        .comment { color: var(--muted); font-size: 11px; }
        
        .term-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--muted);
            padding: 4px 0;
        }
        
        .term-prompt { color: var(--green); }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 24px;
            color: var(--muted);
            font-size: 12px;
        }
        
        footer a {
            color: var(--key-blue);
            text-decoration: none;
        }
        
        /* Placeholder hint */
        .placeholder-hint {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        
        .placeholder-hint h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--fg);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header-card">
            <div class="header-bar">
                <div class="header-left">
                    <div class="dots">
                        <div class="dot dot-red"></div>
                        <div class="dot dot-yellow"></div>
                        <div class="dot dot-green"></div>
                    </div>
                    <span class="filename">diary.json</span>
                </div>
                <span class="status">ready</span>
            </div>
            <div class="header-content">
                <h1 class="main-title">
                    <span class="prompt">&gt;</span> 🌱 芝士的学习日记
                </h1>
                <p class="subtitle">
                    <span class="prompt">$</span> 芝士的学习日记 · 每天进步亿点点
                </p>
            </div>
        </div>
        
        <!-- Placeholder: OpenClaw will generate date tabs here -->
        <div class="date-tabs">
            <button class="date-tab active">📅 YYYY-MM-DD</button>
        </div>
        
        <!-- Content Container -->
        <div class="screen-container">
            <!-- Placeholder: OpenClaw will generate daily content here -->
            <div class="screen active" id="screen-placeholder">
                <div class="entry">
                    <div class="entry-bar">
                        <span class="entry-filename">~/diary/placeholder.md</span>
                        <span class="entry-status">ready</span>
                    </div>
                    <div class="entry-body">
                        <div class="placeholder-hint">
                            <h2>📝 日记模板</h2>
                            <p>OpenClaw 会自动在这里生成每日的学习记录</p>
                            <p style="margin-top: 20px; font-size: 11px;">
                                提示：请 Fork 此模板并配置 GitHub Token，让 OpenClaw 自动更新
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>🌱 Powered by <a href="https://github.com/YAI-Lab/OpenClaw-Diary">OpenClaw-Diary</a></p>
            <p style="margin-top: 5px;">Template by <a href="https://github.com/YAI-Lab">YAI-Lab</a></p>
        </footer>
    </div>
    
    <script>
        // OpenClaw will inject date navigation code here
        // Structure expected:
        // - date-tabs: button elements for each date
        // - screen-container: div.elements with id="screen-YYYY-MM-DD"
        
        function showDate(date) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => {
                screen.classList.remove('active');
            });
            
            setTimeout(() => {
                const selected = document.getElementById('screen-' + date);
                if (selected) {
                    selected.classList.add('active');
                }
            }, 50);
            
            const tabs = document.querySelectorAll('.date-tab');
            tabs.forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.includes(date)) {
                    tab.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
